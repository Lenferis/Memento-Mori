<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memento Mori</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
    <span class="toolbar-brand">memento mori</span>

    <div class="toolbar-right">
        <!-- Language switch -->
        <div class="lang-switcher" id="langSwitcher">
            <button class="lang-btn active" data-lang="en">EN</button>
            <span>·</span>
            <button class="lang-btn" data-lang="ua">UA</button>
            <span>·</span>
            <button class="lang-btn" data-lang="ru">RU</button>
        </div>

        <!-- Settings button (Lucide Settings icon) -->
        <button class="settings-btn" id="settingsBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
    </div>
</div>

<!-- Main card -->
<main class="main-wrap">
    <div class="life-card">

        <!-- header -->
        <div class="card-header">
            <div class="eyebrow" id="eyebrow"></div>
            <h1 class="heading" id="heading"></h1>
            <p class="subhead" id="subhead"></p>
            <div class="age-badge">
                <div class="age-num" id="ageNum"></div>
                <div class="age-lbl" id="ageLbl"></div>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="bar-section">
            <div class="bar-track">
                <div class="bar-fill" id="barFill"></div>
            </div>
            <div class="bar-labels">
                <span id="barStart"></span>
                <span class="bar-pct" id="barPct"></span>
                <span id="barEnd"></span>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Main stats -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- Secondary stats -->
        <div class="secondary-grid" id="secondaryGrid"></div>

        <!-- Mini-progressions: year and week -->
        <div class="context-grid">
            <div class="ctx-cell">
                <div class="ctx-label" id="ctxYearLabel"></div>
                <div class="ctx-track"><div class="ctx-fill" id="yearFill" style="background:#7c6cd4"></div></div>
                <div class="ctx-val" id="yearVal"></div>
            </div>
            <div class="ctx-cell">
                <div class="ctx-label" id="ctxWeekLabel"></div>
                <div class="ctx-track"><div class="ctx-fill" id="weekFill" style="background:#4a9eca"></div></div>
                <div class="ctx-val" id="weekVal"></div>
            </div>
        </div>

        <!-- Grid dot -->
        <div class="weeks-section">
            <div class="weeks-title">
                <span id="weeksLabel"></span>
                <span class="weeks-count" id="weeksCount"></span>
            </div>
            <div class="weeks-grid" id="weeksGrid"></div>
            <div class="weeks-legend">
                <div class="legend-dot" style="background:var(--gold)"></div>
                <span id="legendLived"></span>
                <div class="legend-dot" style="background:var(--gold2);box-shadow:0 0 5px var(--gold2)"></div>
                <span id="legendCurrent"></span>
                <div class="legend-dot" style="background:var(--border-col)"></div>
                <span id="legendFuture"></span>
            </div>
        </div>

        <!-- Footer -->
        <div class="card-footer">
            <span class="footer-left" id="footerDates"></span>
            <span class="footer-right" id="footerUpdated"></span>
        </div>

    </div>
</main>

<!-- Modal Settings -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title" id="modalTitle"></h2>
            <button class="modal-close" id="modalClose">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <div class="modal-body">
            <div class="field-group">
                <label class="field-label" id="labelBirthday"></label>
                <input class="field-input" type="date" id="inputBirthday">
            </div>
            <div class="field-group">
                <label class="field-label" id="labelLifespan"></label>
                <div class="lifespan-row">
                    <input class="field-input" type="number" id="inputLifespan" min="1" max="150">
                    <span class="lifespan-unit" id="lifespanUnit"></span>
                </div>
                <input class="lifespan-range" type="range" id="lifespanRange" min="40" max="120">
                <div class="range-labels"><span>40</span><span>80</span><span>120</span></div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" id="btnCancel"></button>
            <button class="btn-save" id="btnSave"></button>
        </div>
    </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
</body>
</html>
